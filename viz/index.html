<script type="module">

define({id: "799ce230", outputs: ["L","$","topoClient","usTopo","usGeo","seed","rnd","sectors","map","geoLayer","yr","playing","speed","timer","colorMode","selectedFips","years","getGDP","renderMap","selectCounty","updateKPIs","updateRankings","tick"], body: async () => {
const L = await import("./_npm/leaflet@1.9.4/b6187c6b.js");
const $ = id => document.getElementById(id);

const topoClient = await import("./_npm/topojson-client@3.1.0/7fb99109.js");
const usTopo = await fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json").then(r => r.json());
const usGeo = topoClient.feature(usTopo, usTopo.objects.counties);

let seed=777;function rnd(){seed=(seed*16807)%2147483647;return(seed-1)/2147483646;}
const sectors=[
  {n:"Technology",c:"#58a6ff"},{n:"Manufacturing",c:"#d2991d"},{n:"Finance",c:"#3fb950"},
  {n:"Healthcare",c:"#bc8cff"},{n:"Energy",c:"#f85149"},{n:"Agriculture",c:"#7ee787"},
  {n:"Tourism",c:"#f0883e"},{n:"Government",c:"#8b949e"},
];
usGeo.features.forEach((f,i)=>{
  f.properties._sector=Math.floor(rnd()*sectors.length);
  f.properties._baseGDP=10**(2.5+rnd()*1.5);
  f.properties._growth=.005+rnd()*.04;
  f.properties._name=(f.properties?.name||`County #${i}`).replace(/ County$/i,"");
  f.properties._pop=Math.round(10**(2.5+rnd()*2.5));
  f.properties._emp=Math.round(f.properties._pop*(.4+rnd()*.2));
});

const map=L.map($("dash-map"),{zoomControl:true,attributionControl:false}).setView([39,-96],4);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"© CARTO",maxZoom:12}).addTo(map);

let geoLayer,yr=14,playing=false,speed=1,timer=null,colorMode="sector",selectedFips=null;
const years=15;
function getGDP(f){return f.properties._baseGDP*(1+f.properties._growth)**yr;}

function renderMap(){
  if(geoLayer)map.removeLayer(geoLayer);
  let minG=Infinity,maxG=-Infinity,minGr=Infinity,maxGr=-Infinity;
  usGeo.features.forEach(f=>{const g=getGDP(f);if(g<minG)minG=g;if(g>maxG)maxG=g;if(f.properties._growth<minGr)minGr=f.properties._growth;if(f.properties._growth>maxGr)maxGr=f.properties._growth;});
  if(minG===maxG)maxG=minG+1;

  geoLayer=L.geoJSON(usGeo,{
    style:f=>{
      const gdp=getGDP(f),gNorm=Math.log(gdp/minG)/Math.log(maxG/minG);
      let fill,opacity=.82;
      if(colorMode==="sector") fill=sectors[f.properties._sector].c;
      else if(colorMode==="growth"){const gn=(f.properties._growth-minGr)/(maxGr-minGr||1),h=Math.round(200-gn*160),s=Math.round(50+gn*30);fill=`hsl(${h},${s}%,${28+Math.round(gn*28)}%)`;}
      else{const h=Math.round(210-gNorm*160),s=Math.round(40+gNorm*40);fill=`hsl(${h},${s}%,${22+Math.round(gNorm*35)}%)`;opacity=.88;}
      const sel = f.id && String(f.id)===selectedFips;
      return {fillColor:fill,weight:sel?3:.5,opacity:1,color:sel?"#58a6ff":"#30363d",fillOpacity:opacity};
    },
    onEachFeature:(f,layer)=>{
      const gdp=getGDP(f);
      layer.bindTooltip(`<b>${f.properties._name}</b><br>GDP/cap: $${gdp.toLocaleString()}<br>Sector: ${sectors[f.properties._sector].n}`,{sticky:true,className:"dash-tooltip",direction:"top"});
      layer.on({mouseover:e=>{if(String(f.id)!==selectedFips){e.target.setStyle({weight:2,color:"#58a6ff"});e.target.bringToFront();}},mouseout:e=>{if(String(f.id)!==selectedFips)geoLayer.resetStyle(e.target);}});
      layer.on({click:()=>{selectedFips=String(f.id);selectCounty(f);renderMap();}});
    },
  }).addTo(map);
  updateKPIs();updateRankings();
}

function selectCounty(f){
  const gdp=getGDP(f);
  $("county-detail").innerHTML=`
    <div style="font-size:1.05rem;font-weight:700;color:#e6edf3;margin-bottom:0.6rem;">${f.properties._name}</div>
    <div class="detail-row"><span>GDP per capita</span><span class="detail-val" style="color:#58a6ff;">$${gdp.toLocaleString()}</span></div>
    <div class="detail-row"><span>Growth Rate</span><span class="detail-val" style="color:#3fb950;">${(f.properties._growth*100).toFixed(1)}%</span></div>
    <div class="detail-row"><span>Industry</span><span class="detail-val"><span class="sector-dot" style="background:${sectors[f.properties._sector].c};"></span>${sectors[f.properties._sector].n}</span></div>
    <div class="detail-row"><span>Population</span><span class="detail-val">${f.properties._pop.toLocaleString()}</span></div>
    <div class="detail-row"><span>Employment</span><span class="detail-val">${f.properties._emp.toLocaleString()}</span></div>`;
  const allG=usGeo.features.map(x=>getGDP(x));
  const rank=allG.filter(x=>x>gdp).length+1;
  const pct=(rank/allG.length*100).toFixed(1);
  const avg=allG.reduce((a,b)=>a+b,0)/allG.length;
  $("county-metrics").innerHTML=`
    <div class="detail-row"><span>National Rank</span><span class="detail-val" style="color:#58a6ff;">#${rank} / ${allG.length.toLocaleString()}</span></div>
    <div class="detail-row"><span>Percentile</span><span class="detail-val" style="color:#3fb950;">Top ${pct}%</span></div>
    <div class="detail-row"><span>vs. National Avg</span><span class="detail-val" style="color:${gdp>avg?'#3fb950':'#f85149'};">${gdp>avg?'Above':'Below'} avg</span></div>
    <div class="detail-row"><span>Productivity</span><span class="detail-val">$${Math.round(gdp*(f.properties._pop/Math.max(1,f.properties._emp))).toLocaleString()}</span></div>`;
  if(window.parent!==window){
    window.parent.postMessage({
      type:'countySelected',
      name:f.properties._name,gdp:Math.round(gdp),
      growth:(f.properties._growth*100).toFixed(1),
      sector:sectors[f.properties._sector].n,
      sectorColor:sectors[f.properties._sector].c,
      population:f.properties._pop,employment:f.properties._emp,
      rank:rank,total:allG.length,percentile:pct,
      aboveAvg:gdp>avg
    },'*');
  }
}

function updateKPIs(){
  const allG=usGeo.features.map(f=>getGDP(f));
  const avg=allG.reduce((a,b)=>a+b,0)/allG.length;
  const secCnt={};usGeo.features.forEach(f=>{secCnt[f.properties._sector]=(secCnt[f.properties._sector]||0)+1;});
  const topSector=Object.entries(secCnt).sort((a,b)=>b[1]-a[1])[0];
  $("dash-year-label").textContent=2010+yr;$("dash-year").value=yr;
  $("kpi-bar").innerHTML=[
    `<div class="card" style="text-align:center;"><span class="metric-value" style="color:#58a6ff;">${usGeo.features.length.toLocaleString()}</span><div class="metric-label">Counties</div></div>`,
    `<div class="card" style="text-align:center;"><span class="metric-value" style="color:#c9d1d9;">$${(avg/1000).toFixed(1)}k</span><div class="metric-label">Avg GDP/capita</div></div>`,
    `<div class="card" style="text-align:center;"><span class="metric-value" style="color:#3fb950;">$${(Math.max(...allG)/1000).toFixed(1)}k</span><div class="metric-label">Maximum</div></div>`,
    `<div class="card" style="text-align:center;"><span class="metric-value" style="color:#f85149;">$${(Math.min(...allG)/1000).toFixed(1)}k</span><div class="metric-label">Minimum</div></div>`,
    `<div class="card" style="text-align:center;"><span class="metric-value" style="color:#d2991d;">${topSector?.[0]?sectors[+topSector[0]].n:'—'}</span><div class="metric-label">Top Sector</div></div>`,
  ].join("");
}

function updateRankings(){
  const allG=usGeo.features.map(f=>({name:f.properties._name,gdp:getGDP(f)}));
  const sorted=[...allG].sort((a,b)=>b.gdp-a.gdp);
  $("rank-top").innerHTML=sorted.slice(0,10).map((c,i)=>`<div class="detail-row"><span><b>${i+1}.</b> ${c.name}</span><span class="detail-val" style="color:#58a6ff;">$${(c.gdp/1000).toFixed(0)}k</span></div>`).join("");
  $("rank-bottom").innerHTML=sorted.slice(-10).reverse().map((c,i)=>`<div class="detail-row"><span><b>${sorted.length-9+i}.</b> ${c.name}</span><span class="detail-val" style="color:#f85149;">$${(c.gdp/1000).toFixed(0)}k</span></div>`).join("");
  const secCnt={};usGeo.features.forEach(f=>{secCnt[f.properties._sector]=(secCnt[f.properties._sector]||0)+1;});
  const maxSec=Math.max(...Object.values(secCnt));
  $("sector-bars").innerHTML=sectors.map((s,i)=>{const c=secCnt[i]||0,pct=c/maxSec*100;return`<div style="margin-bottom:6px;"><div style="display:flex;justify-content:space-between;font-size:0.72rem;margin-bottom:2px;"><span><span class="sector-dot" style="background:${s.c};"></span>${s.n}</span><span style="font-weight:600;">${c.toLocaleString()}</span></div><div style="height:4px;background:#21262d;border-radius:2px;"><div style="width:${pct}%;height:100%;background:${s.c};border-radius:2px;"></div></div></div>`;}).join("");
}

function tick(){yr=(yr+1)%years;renderMap();if(playing)timer=setTimeout(tick,500/speed);}
$("dash-play").onclick=()=>{playing=!playing;if(playing)tick();else clearTimeout(timer);$("dash-play").textContent=playing?"⏸ Pause":"▶ Play";$("dash-play").className=playing?"playing":"";};
$("dash-year").oninput=()=>{yr=+$("dash-year").value;renderMap();};
$("dash-speed").onchange=()=>{speed=+$("dash-speed").value;};
document.querySelectorAll("#dash-controls button[data-c]").forEach(b=>{b.onclick=()=>{document.querySelectorAll("#dash-controls button[data-c]").forEach(x=>x.classList.remove("act"));b.classList.add("act");colorMode=b.dataset.c;renderMap();};});
document.addEventListener("keydown",e=>{if(e.code==="Space"&&document.activeElement===document.body){e.preventDefault();$("dash-play").click();}});

renderMap();
setTimeout(()=>map.invalidateSize(),300);
return {L,$,topoClient,usTopo,usGeo,seed,rnd,sectors,map,geoLayer,yr,playing,speed,timer,colorMode,selectedFips,years,getGDP,renderMap,selectCounty,updateKPIs,updateRankings,tick};
}});

</script>
